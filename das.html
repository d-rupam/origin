<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sandbox | Rupam Das</title>
    <meta name="description" content="Experimental testing ground for the Rupam Das architecture.">

    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            border: 1px dashed #30363d; /* Dashed border to indicate testing area */
            padding: 30px;
            border-radius: 8px;
            background-color: rgba(22, 27, 34, 0.85);
            box-shadow: 0 0 20px rgba(139, 148, 158, 0.1);
            max-width: 600px;
            width: 100%;
            box-sizing: border-box;
            text-align: left;
            backdrop-filter: blur(5px);
        }

        h1 {
            color: #8b949e; /* Muted terminal gray */
            letter-spacing: 2px;
            font-size: clamp(1.2rem, 5vw, 1.5rem);
            margin-top: 0;
            border-bottom: 1px dashed #30363d;
            padding-bottom: 15px;
            text-align: center;
            white-space: nowrap;
        }

        p {
            font-size: 1rem;
            line-height: 1.6;
            margin: 12px 0;
            word-wrap: break-word;
        }

        @media (min-width: 480px) {
            p {
                font-size: 1.1rem;
            }
        }

        .highlight {
            color: #ff7b72; /* GitHub red/orange for experimental warning */
            font-weight: bold;
            text-shadow: 0 0 5px rgba(255, 123, 114, 0.3);
        }

        .btn {
            display: block;
            margin-top: 35px;
            padding: 12px 20px;
            background-color: #21262d;
            color: #c9d1d9;
            text-decoration: none;
            border-radius: 5px;
            border: 1px solid #30363d;
            font-weight: bold;
            text-align: center;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:hover {
            background-color: #30363d;
            color: #ffffff;
            border-color: #8b949e;
        }

        .cursor {
            display: inline-block;
            width: 10px;
            height: 18px;
            background-color: #8b949e;
            vertical-align: middle;
            animation: blink 1s step-end infinite;
            margin-left: 5px;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Rupam Das | Sandbox</h1>
        
        <p>>> Environment: <span class="highlight">Experimental Node</span></p>
        <p>>> System Status: Standby Mode</p>
        <p>>> Purpose: Code deployments are tested here before merging to the main Origin architecture.</p>
        <p>>> Current Action: Awaiting next script injection<span class="cursor"></span></p>
        
        <a href="https://rupamdas.in" class="btn">Return to Origin</a>
    </div>
</body>
</html>
